name: iOS Build
on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Apple certificate and provisioning profile
        env:
          DISTRIBUTION_P12_BASE64: ${{ secrets.DISTRIBUTION_P12_BASE64 }}
          DISTRIBUTION_P12_PASSWORD: ${{ secrets.DISTRIBUTION_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import distribution certificate
          echo "$DISTRIBUTION_P12_BASE64" | base64 --decode > distribution.p12
          security import distribution.p12 \
            -k build.keychain \
            -P "$DISTRIBUTION_P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Install provisioning profile
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/HEX_App_Store.mobileprovision"

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build and archive iOS app
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM=YKN5BXC893 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="HEX App Store"

      - name: Export IPA
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>YKN5BXC893</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.hexapp.training</key>
              <string>HEX App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ios/App/IPA

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HEX-ios
          path: ios/App/IPA/*.ipa

      - name: Upload to TestFlight
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          # Write API private key to the location altool expects
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Locate the exported IPA
          IPA_PATH=$(find ios/App/IPA -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa file found in ios/App/IPA"
            ls -la ios/App/IPA/ 2>/dev/null || echo "IPA directory does not exist"
            exit 1
          fi
          echo "Uploading: $IPA_PATH"

          # Upload to TestFlight
          # Note: xcrun altool is known to exit 0 even on failure, so we also
          # grep the output for known error strings as a second safety net.
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose 2>&1 | tee upload_output.log
          UPLOAD_EXIT=${PIPESTATUS[0]}

          # Catch altool silent failures (exits 0 but prints ERROR / Failed to upload)
          if grep -qE "Failed to upload|ERROR:.*upload|bundle version must be higher" upload_output.log; then
            echo "------- altool reported a failure — full log below -------"
            cat upload_output.log
            echo "----------------------------------------------------------"
            echo "ERROR: TestFlight upload failed (altool exited $UPLOAD_EXIT but output contains failure message)"
            echo "Most likely cause: build number already uploaded. Bump CURRENT_PROJECT_VERSION."
            exit 1
          fi

          if [ $UPLOAD_EXIT -ne 0 ]; then
            echo "------- Upload failed — full log below -------"
            cat upload_output.log
            echo "----------------------------------------------"
            echo "ERROR: TestFlight upload failed with exit code $UPLOAD_EXIT"
            exit $UPLOAD_EXIT
          fi

          echo "Successfully uploaded to TestFlight!"
